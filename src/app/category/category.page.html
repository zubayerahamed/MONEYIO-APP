<ion-header [translucent]="true">
    <ion-toolbar>
        <ion-buttons slot="start">
            <ion-menu-button></ion-menu-button>
        </ion-buttons>
        <ion-title>
            Categories
        </ion-title>
        <ion-buttons slot="end">
            <ion-button (click)="addCategory()">
                <ion-icon name="add" slot="icon-only"></ion-icon>
            </ion-button>
        </ion-buttons>
    </ion-toolbar>

    <div class="single-row-segment-container">
        <ion-segment [value]="segmentValue" (ionChange)="segmentChanged($event)" mode="ios"
            [class.income-theme]="segmentValue === 'income'"
            [class.expense-theme]="segmentValue === 'expense'"
            [class.loan-theme]="segmentValue === 'loan'">
            <ion-segment-button value="income">
                <ion-label>Income</ion-label>
            </ion-segment-button>
            <ion-segment-button value="expense">
                <ion-label>Expense</ion-label>
            </ion-segment-button>
            <ion-segment-button value="loan">
                <ion-label>Loan</ion-label>
            </ion-segment-button>
        </ion-segment>
    </div>
</ion-header>

<ion-content [fullscreen]="true">
    <ion-list lines="full">
        <ion-item-sliding *ngFor="let category of categories">
            <ion-item>
                <div class="icon-circle" slot="start" 
                    [class.income-bg]="segmentValue === 'income'"
                    [class.expense-bg]="segmentValue === 'expense'"
                    [class.loan-bg]="segmentValue === 'loan'">
                    <ion-icon [name]="segmentValue === 'expense' ? 'cart-outline' : 'briefcase-outline'"></ion-icon>
                </div>
                <ion-label>
                    <h2>{{ category }}</h2>
                </ion-label>
            </ion-item>

            <ion-item-options side="end">
                <ion-item-option (click)="editCategory(category)" color="primary">
                    <ion-icon name="pencil" slot="icon-only"></ion-icon>
                </ion-item-option>
                <ion-item-option (click)="deleteCategory(category)" color="danger">
                    <ion-icon name="trash" slot="icon-only"></ion-icon>
                </ion-item-option>
            </ion-item-options>
        </ion-item-sliding>
    </ion-list>

    <div class="ion-padding ion-text-center" *ngIf="categories.length === 0">
        <p>No categories found for this segment.</p>
    </div>
</ion-content>
