<ion-app>
    <ion-menu contentId="main-content" type="overlay" [disabled]="!(authService.isAuthenticated$ | async)">
        <ion-header>
            <ion-toolbar color="primary">
                <ion-title>MoneyIO</ion-title>
            </ion-toolbar>
        </ion-header>

        <ion-content>
            <ion-list id="menu-list">
                <ion-list-header>Menu</ion-list-header>
                <ion-note class="ion-padding-start">Manage your finances</ion-note>

                <ion-menu-toggle auto-hide="false" *ngFor="let p of appPages; let i = index">
                    <ion-item routerDirection="root" [routerLink]="[p.url]" lines="none" detail="false" routerLinkActive="selected">
                        <ion-icon slot="start" [name]="p.icon"></ion-icon>
                        <ion-label>{{ p.title }}</ion-label>
                    </ion-item>
                </ion-menu-toggle>
            </ion-list>
        </ion-content>

        <ion-footer>
            <ion-list lines="none">
                <ion-menu-toggle auto-hide="false">
                    <ion-item (click)="onLogout()" button class="logout-item">
                        <ion-icon slot="start" name="log-out-outline" color="danger"></ion-icon>
                        <ion-label color="danger">Logout</ion-label>
                    </ion-item>
                </ion-menu-toggle>
            </ion-list>
        </ion-footer>
    </ion-menu>

    <ion-router-outlet id="main-content"></ion-router-outlet>
</ion-app>
