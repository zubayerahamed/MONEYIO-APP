<ion-header [translucent]="true">
    <ion-toolbar>
        <ion-buttons slot="start">
            <ion-menu-button></ion-menu-button>
        </ion-buttons>
        <ion-title>
            Status
        </ion-title>
    </ion-toolbar>
    <ion-toolbar>
        <ion-segment [value]="segmentValue" (ionChange)="segmentChanged($event)" mode="md">
            <ion-segment-button value="monthly">
                <ion-label>Monthly</ion-label>
            </ion-segment-button>
            <ion-segment-button value="yearly">
                <ion-label>Yearly</ion-label>
            </ion-segment-button>
        </ion-segment>
    </ion-toolbar>
    <ion-toolbar class="navigation-toolbar">
        <div class="navigation-container">
            <ion-button fill="clear" (click)="prev()" color="dark">
                <ion-icon name="chevron-back-outline" slot="icon-only"></ion-icon>
            </ion-button>
            <div class="current-date">
                {{ dateDisplay }}
            </div>
            <ion-button fill="clear" (click)="next()" color="dark">
                <ion-icon name="chevron-forward-outline" slot="icon-only"></ion-icon>
            </ion-button>
        </div>
    </ion-toolbar>
    <ion-toolbar>
        <ion-segment [value]="statusType" (ionChange)="statusTypeChanged($event)" mode="ios" class="category-segment"
                     [class.income-theme]="statusType === 'income'" 
                     [class.expense-theme]="statusType === 'expense'"
                     [class.loan-theme]="statusType === 'loan'">
            <ion-segment-button value="income">
                <ion-label>Income</ion-label>
            </ion-segment-button>
            <ion-segment-button value="expense">
                <ion-label>Expense</ion-label>
            </ion-segment-button>
            <ion-segment-button value="loan">
                <ion-label>Loan</ion-label>
            </ion-segment-button>
        </ion-segment>
    </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" [scrollY]="false">
    <div class="status-container">
        <div class="chart-section ion-padding-horizontal ion-padding-top">
            <ion-card class="main-chart-card">
                <ion-card-content>
                    <div class="donut-wrapper">
                        <canvas #donutCanvas></canvas>
                        <div class="chart-center-text">
                            <span class="total-label">Total</span>
                            <span class="total-amount">${{ totalAmount | number:'1.2-2' }}</span>
                        </div>
                    </div>
                </ion-card-content>
            </ion-card>
        </div>

        <div class="list-section ion-padding-horizontal">
            <ion-list lines="full" class="data-list">
                <ion-item *ngFor="let item of currentData">
                    <div class="color-dot" [style.background-color]="item.color" slot="start"></div>
                    <ion-label>
                        <h2>{{ item.label }}</h2>
                        <p>{{ (item.amount / totalAmount * 100) | number:'1.1-1' }}%</p>
                    </ion-label>
                    <ion-text slot="end" [color]="statusType === 'income' ? 'success' : (statusType === 'expense' ? 'danger' : 'primary')">
                        <span class="item-amount">${{ item.amount | number:'1.2-2' }}</span>
                    </ion-text>
                </ion-item>
            </ion-list>
        </div>
    </div>
</ion-content>
