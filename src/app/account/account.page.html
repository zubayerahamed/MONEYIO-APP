<ion-header [translucent]="true">
    <ion-toolbar>
        <ion-buttons slot="start">
            <ion-menu-button></ion-menu-button>
        </ion-buttons>
        <ion-title>
            Accounts
        </ion-title>
        <ion-buttons slot="end">
            <ion-button (click)="addAccount()">
                <ion-icon name="add" slot="icon-only"></ion-icon>
            </ion-button>
        </ion-buttons>
    </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
    <ion-header collapse="condense">
        <ion-toolbar>
            <ion-title size="large">Accounts</ion-title>
        </ion-toolbar>
    </ion-header>

    <div class="summary-charts-container">
        <ion-card class="chart-card total-balance-card">
            <ion-card-content>
                <div class="chart-wrapper">
                    <canvas #totalChartCanvas></canvas>
                    <div class="chart-center-text">
                        <span class="label">Total</span>
                        <span class="amount">{{ totalBalance | currency }}</span>
                    </div>
                </div>
            </ion-card-content>
        </ion-card>

        <ion-card class="chart-card excluded-balance-card" *ngIf="excludedBalance !== 0">
            <ion-card-content>
                <div class="chart-wrapper">
                    <canvas #excludedChartCanvas></canvas>
                    <div class="chart-center-text">
                        <span class="label">Excluded</span>
                        <span class="amount">{{ excludedBalance | currency }}</span>
                    </div>
                </div>
            </ion-card-content>
        </ion-card>
    </div>

    <ion-list lines="full">
        <ion-item-sliding *ngFor="let account of accounts">
            <ion-item>
                <div class="color-dot" [style.background-color]="account.color" slot="start"></div>
                <ion-label>
                    <h2>{{ account.name }}</h2>
                </ion-label>
                <ion-note slot="end"
                    [color]="account.balance < 0 ? 'danger' : (account.isExcluded ? 'medium' : 'primary')">
                    {{ account.balance | currency }}
                </ion-note>
            </ion-item>

            <ion-item-options side="end">
                <ion-item-option *ngIf="!account.isExcluded" (click)="excludeAccount(account)" color="warning">
                    <ion-icon name="eye-off" slot="icon-only"></ion-icon>
                </ion-item-option>
                <ion-item-option *ngIf="account.isExcluded" (click)="includeAccount(account)" color="warning">
                    <ion-icon name="eye" slot="icon-only"></ion-icon>
                </ion-item-option>
                <ion-item-option (click)="editAccount(account)" color="primary">
                    <ion-icon name="pencil" slot="icon-only"></ion-icon>
                </ion-item-option>
                <ion-item-option (click)="deleteAccount(account)" color="danger">
                    <ion-icon name="trash" slot="icon-only"></ion-icon>
                </ion-item-option>
            </ion-item-options>
        </ion-item-sliding>
    </ion-list>
</ion-content>
